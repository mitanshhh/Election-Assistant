name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true
      
      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/election-assistant \
            --project=${{ secrets.GCP_PROJECT_ID }}
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy election-assistant \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/election-assistant \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }} \
            --update-secrets GOOGLE_SERVICE_ACCOUNT_JSON=google-service-key:latest \
            --project=${{ secrets.GCP_PROJECT_ID }}
