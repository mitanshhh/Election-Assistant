name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true
      
      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker gcr.io
      
      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/election-assistant:latest .
      
      - name: Push to Google Container Registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/election-assistant:latest
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy election-assistant \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/election-assistant:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }} \
            --project=${{ secrets.GCP_PROJECT_ID }}