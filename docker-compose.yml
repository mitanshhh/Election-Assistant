version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=development
      - GOOGLE_SHEETS_ID=${GOOGLE_SHEETS_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=/run/secrets/google_key
    secrets:
      - google_key
    volumes:
      - ./server/src:/app/src

secrets:
  google_key:
    file: ./service-account-key.json
    
